    <!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>8px Grid Dashboard</title>
    <style>
        /* Grund-Reset */
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: sans-serif;
            background-color: #f0f0f0;
            padding: 16px; /* 8px x 2 */
        }

        /* Das Grid-System */
        .grid-container {
            display: grid;
            /* Sidebar: 250px | Content: Rest */
            grid-template-columns: 250px 1fr;
            /* Header: auto | Main: min 400px | Footer: auto */
            grid-template-rows: auto minmax(400px, 1fr) auto;
            
            gap: 16px; /* 8px x 2 */
            max-width: 1200px;
            margin: 0 auto;
        }

        /* Platzierung der Elemente */
        header, footer {
            grid-column: 1 / -1; /* Volle Breite */
            padding: 24px;       /* 8px x 3 */
            background-color: #333;
            color: white;
        }

        aside {
            padding: 16px;       /* 8px x 2 */
            background-color: #ddd;
        }

        main {
            padding: 32px;       /* 8px x 4 */
            background-color: #fff;
            border: 1px solid #ccc;
        }

        /* Visualisierungshilfe für Studenten */
        .debug-info { font-size: 0.8rem; color: #666; margin-top: 8px; }
    </style>
</head>
<body>

    <div class="grid-container">
        <header>
            <h2>Dashboard Header</h2>
            <p class="debug-info">grid-column: 1 / -1 | Padding: 24px</p>
        </header>

        <aside>
            <h3>Navigation</h3>
            <p class="debug-info">Width: 250px | Padding: 16px</p>
        </aside>

        <main>
            <h1>Main Content</h1>
            <p>Hier landen die primären Dashboard-Widgets.</p>
            <p class="debug-info">Gap im Container: 16px | Padding: 32px</p>
        </main>

        <footer>
            <p>Dashboard Footer – Erstellt nach der 8px-Regel</p>
        </footer>
    </div>

</body>
</html>
