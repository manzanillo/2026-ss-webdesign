<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Source+Code+Pro:wght@900&display=swap" rel="stylesheet">
    <title>404</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: #fff;
            color: #000;
            font-family: "Source Code Pro", monospace;
            font-weight: 900;
            padding: 2rem;
            border: 8px solid #000;
            min-height: 100vh;
        }

        h1 {
            font-size: clamp(6rem, 20vw, 14rem);
            line-height: 1;
            border-bottom: 8px solid #000;
            padding-bottom: 1rem;
        }

        p {
            font-size: 1.25rem;
            font-weight: 400;
            margin-top: 2rem;
            max-width: 40ch;
        }

        a {
            color: #000;
            display: inline-block;
            border: 4px solid #000;
            padding: 0.5rem 1rem;
            text-decoration: none;
            margin-top: 1rem;
        }

        a:hover { background: #000; color: #fff; }

        .typing {
            margin-top: 2rem;
            font-size: 0.85rem;
            font-weight: 400;
            max-width: 50ch;
            opacity: 0.5;
        }
    </style>
</head>
<body>
    <h1>404</h1>
    <p>Die angeforderte Seite konnte nicht gefunden werden.</p>
    <a href="/">Zur Startseite</a>
    <div class="typing"></div>

    <script>
        const el = document.querySelector('.typing');
        const msg = 'Das ist brutalistisch!';
        let i = 0;
        (function type() {
            if (i < msg.length) { el.textContent += msg[i++]; setTimeout(type, 80); }
        })();
    </script>
</body>
</html>
